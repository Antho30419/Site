<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connection</title>
        <link rel="stylesheet" href="css/styles.css">

    </head>
    <body>
        <form action>
            <fieldset class="boiteLogin">
                <legend class="titleLogin">Login</legend>

                <label id="userText" for="user">Username: </label>
                <input type="text" name="username" id="user">
                <input type="button" value="Francais" class="buttonLangue" name="langue" id="langue">
                <br>
                <br>
                <label id="passText" for="pass">Password: </label>
                <input type="text" name="password" id="pass">
                <div id="erreur" class="erreurText"></div>
                <br>
                <input class="buttonForm" type="button" id="submit" value="Submit">
                <input class="buttonForm" type="reset" id="reset">


            </fieldset>

        </form>

        <script src="js/code.js"></script>
    </body>
</html>
